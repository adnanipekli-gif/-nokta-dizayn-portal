version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "adnanipekli-gif"
    allow:
      - dependency-type: "all"
    ignore:
      # Ignore breaking changes, manual review required
      - dependency-name: "vite"
      - dependency-name: "esbuild"
    commit-message:
      prefix: "deps"
      prefix-scope: "npm"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    milestone: 1
    rebase-strategy: "auto"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    reviewers:
      - "adnanipekli-gif"
    labels:
      - "ci"
      - "github-actions"
