name: 🛡️ Security Audit & Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 2 AM

env:
  NODE_VERSION: '18'

jobs:
  npm-audit:
    name: 📦 npm Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: |
          echo "🔍 Scanning for npm vulnerabilities..."
          npm audit --audit-level=moderate || {
            echo "❌ Vulnerabilities found!"
            npm audit
            exit 1
          }
      
      - name: Generate npm audit report
        if: failure()
        run: npm audit > npm-audit-report.txt
      
      - name: Upload audit report
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: npm-audit-report
          path: npm-audit-report.txt

  dependency-check:
    name: 🔗 Dependency Chain Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Check for outdated packages
        run: |
          npm outdated || true
      
      - name: Validate package-lock.json
        run: |
          npm ci --audit
      
      - name: Check for missing dependencies
        run: |
          npm ls --missing || true

  security-headers:
    name: 🔐 Security Headers Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Verify vite.config.js security headers
        run: |
          echo "🔍 Checking vite.config.js for security headers..."
          grep -q "Content-Security-Policy" vite.config.js && echo "✅ CSP configured" || echo "❌ CSP missing"
          grep -q "X-Frame-Options" vite.config.js && echo "✅ XFO configured" || echo "❌ XFO missing"
          grep -q "X-Content-Type-Options" vite.config.js && echo "✅ XCTO configured" || echo "❌ XCTO missing"
          grep -q "Strict-Transport-Security" vite.config.js && echo "✅ HSTS configured" || echo "❌ HSTS missing"

  build-security:
    name: 🏗️ Build & Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build
      
      - name: Check bundle size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "📊 Bundle size: $SIZE"
          if [ $(du -sk dist/ | cut -f1) -gt 600000 ]; then
            echo "⚠️  Warning: Bundle larger than 600MB indicates possible supply chain attack or bloat"
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist/

  sast-scanning:
    name: 🔎 Static Application Security Testing
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: 'javascript'
          queries: security-and-quality
      
      - name: Install dependencies
        run: npm ci
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: '/language:javascript'

  license-check:
    name: 📋 License Compliance
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install license checker
        run: npm install -g license-report
      
      - name: Check licenses
        run: |
          echo "🔍 Checking npm package licenses..."
          npx license-report --only=prod || true

  security-summary:
    name: 📝 Security Summary
    runs-on: ubuntu-latest
    needs: [npm-audit, dependency-check, security-headers, build-security, sast-scanning, license-check]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Print security summary
        run: |
          echo "╔════════════════════════════════════════════════╗"
          echo "║       🛡️  SECURITY AUDIT SUMMARY              ║"
          echo "╚════════════════════════════════════════════════╝"
          echo ""
          echo "📦 Dependency Status: ${{ needs.npm-audit.result }}"
          echo "🔗 Chain Analysis: ${{ needs.dependency-check.result }}"
          echo "🔐 Security Headers: ${{ needs.security-headers.result }}"
          echo "🏗️  Build Status: ${{ needs.build-security.result }}"
          echo "🔎 SAST Scan: ${{ needs.sast-scanning.result }}"
          echo "📋 License Check: ${{ needs.license-check.result }}"
          echo ""
          echo "⚠️  NOTE: This is continuous automated scanning."
          echo "📊 For manual penetration testing, see VULNERABILITY_ASSESSMENT.md"
          echo ""
      
      - name: Check for critical failures
        run: |
          if [ "${{ needs.npm-audit.result }}" = "failure" ]; then
            echo "❌ CRITICAL: npm vulnerabilities detected!"
            exit 1
          fi
          if [ "${{ needs.sast-scanning.result }}" = "failure" ]; then
            echo "❌ CRITICAL: Code quality issues detected!"
            exit 1
          fi
