<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nokta Dizayn — ND Group | Mimari Proje Portalı</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --color-deep-teal: #1B3D4F;
        --color-mid-teal: #2A5A72;
        --color-cyan: #00C4CC;
        --color-cyan-light: #33D4DB;
        --color-cyan-dim: rgba(0,196,204,0.10);
        --color-magenta: #D4006A;
        --color-magenta-dim: rgba(212,0,106,0.10);
        --color-snow: #F8FAFC;
        --color-cloud: #F1F5F9;
        --color-mist: #E2E8F0;
        --color-fog: #94A3B8;
        --color-steel: #64748B;
        --color-slate: #334155;
        --color-ink: #0F172A;
        --color-success: #10B981;
        --color-warning: #F59E0B;
        --color-danger: #EF4444;
        --font-display: "Outfit", "Segoe UI", system-ui, sans-serif;
        --font-ui: "DM Sans", "Segoe UI", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", monospace;
        --shadow-sm: 0px 1px 3px rgba(15,23,42,0.08), 0px 1px 2px rgba(15,23,42,0.04);
        --shadow-md: 0px 4px 6px rgba(15,23,42,0.07), 0px 2px 4px rgba(15,23,42,0.04);
        --shadow-cyan-glow: 0px 0px 0px 3px rgba(0,196,204,0.20);
        --radius-card: 10px;
        --radius-button: 8px;
        --radius-input: 6px;
      }

      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

      body {
        background: #F8FAFC;
        font-family: var(--font-ui);
        color: #0F172A;
      }

      /* Yükleme sırasında beyaz flash — siyah değil */
      #root { min-height: 100vh; background: #F8FAFC; }

      /* 3D Canvas fix — siyah ekran önleme */
      canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
